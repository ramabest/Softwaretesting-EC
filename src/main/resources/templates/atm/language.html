<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sprache</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="shell atm-shell">
  <section class="panel stack atm-panel">
    <h1>Sprache waehlen</h1>
    <form class="actions" method="post" th:action="@{'/atm/' + ${sessionId} + '/language'}">
      <button name="language" value="de">Deutsch</button>
      <button name="language" value="en" class="secondary">English</button>
    </form>
  </section>
</main>
</body>
</html>
