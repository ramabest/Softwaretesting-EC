<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="shell">
  <div class="topbar">
    <div class="brand">Admin</div>
    <nav class="nav">
      <a class="button secondary" th:href="@{/atm}">ATM</a>
      <a class="button secondary" th:href="@{/admin/accounts}">Konten</a>
      <a class="button secondary" th:href="@{/admin/cards}">Karten</a>
      <a class="button secondary" th:href="@{/admin/cassette}">Kassette</a>
      <form method="post" th:action="@{/logout}"><button class="secondary" type="submit">Logout</button></form>
    </nav>
  </div>
  <section class="grid">
    <div class="metric"><span>Konten</span><strong th:text="${accountCount}"></strong></div>
    <div class="metric"><span>Karten</span><strong th:text="${cardCount}"></strong></div>
    <div class="metric"><span>Kassette</span><strong th:text="${cashTotal}"></strong></div>
  </section>
</main>
</body>
</html>
