<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geldkassette</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="shell">
  <div class="topbar">
    <div class="brand">Geldkassette</div>
    <nav class="nav"><a class="button secondary" th:href="@{/admin}">Dashboard</a></nav>
  </div>
  <section class="panel stack">
    <div class="metric"><span>Gesamtsumme</span><strong th:text="${cashTotal}"></strong></div>
    <form class="stack" method="post" th:action="@{/admin/cassette}">
      <table>
        <thead><tr><th>Schein</th><th>Anzahl</th></tr></thead>
        <tbody>
        <tr th:each="slot : ${slots}">
          <td th:text="${slot.denominationCents / 100} + ' EUR'"></td>
          <td><input type="number" min="0" th:name="${'denomination_' + slot.denominationCents}" th:value="${slot.noteCount}"></td>
        </tr>
        </tbody>
      </table>
      <button type="submit">Kassette speichern</button>
    </form>
  </section>
</main>
</body>
</html>
