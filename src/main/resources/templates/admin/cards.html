<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Karten</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="shell">
  <div class="topbar">
    <div class="brand">Karten</div>
    <nav class="nav"><a class="button secondary" th:href="@{/admin}">Dashboard</a></nav>
  </div>
  <section class="panel stack">
    <div class="table-wrap">
    <table class="card-admin-table">
      <thead><tr><th>Nummer</th><th>Kunde</th><th>Typ</th><th>Status</th><th>Ablauf</th><th>Fehl.</th><th>PIN</th><th>Speichern</th></tr></thead>
      <tbody>
      <tr th:each="card : ${cards}">
        <td th:text="${card.cardNumber}"></td>
        <td class="owner-cell">
          <span th:if="${card.account != null}" th:text="${card.account.ownerFirstName + ' ' + card.account.ownerLastName}"></span>
          <span class="muted" th:if="${card.account == null}">kein Konto</span>
        </td>
        <td>
          <select name="cardType" th:form="${'card-form-' + card.id}">
            <option th:each="type : ${types}" th:value="${type}" th:text="${type}" th:selected="${type == card.cardType}"></option>
          </select>
        </td>
        <td>
          <select name="status" th:form="${'card-form-' + card.id}">
            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}" th:selected="${status == card.status}"></option>
          </select>
        </td>
        <td><input name="expiresOn" type="date" th:value="${card.expiresOn}" th:form="${'card-form-' + card.id}"></td>
        <td th:text="${card.failedPinAttempts}"></td>
        <td>
          <form class="card-pin-form" method="post" th:action="@{'/admin/cards/' + ${card.id} + '/pin'}">
            <input name="pin" pattern="[0-9]{4}" maxlength="4" placeholder="1234">
            <button class="secondary" type="submit">PIN setzen</button>
          </form>
        </td>
        <td>
          <form method="post" th:id="${'card-form-' + card.id}" th:action="@{'/admin/cards/' + ${card.id}}">
            <button type="submit">Speichern</button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
    </div>
  </section>
</main>
</body>
</html>
