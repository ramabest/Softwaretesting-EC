<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Konten</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="shell">
  <div class="topbar">
    <div class="brand">Konten</div>
    <nav class="nav"><a class="button secondary" th:href="@{/admin}">Dashboard</a></nav>
  </div>
  <section class="panel stack">
    <h2>Konto erstellen</h2>
    <form class="grid" method="post" th:action="@{/admin/accounts}">
      <label>IBAN <input name="iban" required></label>
      <label>Vorname <input name="ownerFirstName" required></label>
      <label>Nachname <input name="ownerLastName" required></label>
      <label>Kontostand in Cent <input name="balanceCents" type="number" value="0" required></label>
      <label>Ueberziehung in Cent <input name="overdraftLimitCents" type="number" value="50000" required></label>
      <label>Aktiv <select name="active"><option value="true">Ja</option><option value="false">Nein</option></select></label>
      <div class="actions"><button type="submit">Erstellen</button></div>
    </form>
  </section>
  <section class="panel stack" style="margin-top: 18px;">
    <h2>Bestehende Konten</h2>
    <table>
      <thead><tr><th>IBAN</th><th>Name</th><th>Saldo</th><th>Ueberziehung</th><th>Status</th><th>Aktion</th></tr></thead>
      <tbody>
      <tr th:each="account : ${accounts}">
        <td th:text="${account.iban}"></td>
        <td th:text="${account.ownerFirstName + ' ' + account.ownerLastName}"></td>
        <td th:text="${account.balanceCents} + ' ct'"></td>
        <td th:text="${account.overdraftLimitCents} + ' ct'"></td>
        <td th:text="${account.active ? 'aktiv' : 'deaktiviert'}"></td>
        <td>
          <form method="post" th:action="@{'/admin/accounts/' + ${account.id} + '/status'}">
            <input type="hidden" name="active" th:value="${!account.active}">
            <button class="secondary" type="submit" th:text="${account.active ? 'Deaktivieren' : 'Aktivieren'}"></button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
  </section>
</main>
</body>
</html>
