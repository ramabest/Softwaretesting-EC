<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Menue</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="shell atm-shell">
  <section class="panel stack atm-panel">
    <h1>Was moechten Sie tun?</h1>
    <div class="actions">
      <a class="button" th:href="@{'/atm/' + ${sessionId} + '/balance'}">Kontostand anzeigen</a>
      <a class="button secondary" th:href="@{'/atm/' + ${sessionId} + '/withdraw'}">Bargeld abheben</a>
      <a class="button secondary" th:href="@{/atm}">Beenden</a>
    </div>
  </section>
</main>
</body>
</html>
