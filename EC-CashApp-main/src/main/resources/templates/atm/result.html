<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auszahlung erfolgreich</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="shell atm-shell">
  <section class="panel stack atm-panel">
    <h1>Auszahlung erfolgreich</h1>
    <div class="success">Bitte entnehmen Sie Ihr Bargeld.</div>
    <div class="grid">
      <div class="metric"><span>Auszahlung</span><strong th:text="${amount}"></strong></div>
      <div class="metric"><span>Gebuehr</span><strong th:text="${fee}"></strong></div>
      <div class="metric"><span>Neuer Kontostand</span><strong th:text="${balance}"></strong></div>
    </div>
    <a class="button secondary" th:href="@{/atm}">Neue Transaktion</a>
  </section>
</main>
</body>
</html>
